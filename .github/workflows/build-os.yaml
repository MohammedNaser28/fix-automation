name: Build Bootable OS & Rust Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-os:
    name: Compile Buildroot OS & Rust Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: fix-automation

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make gcc g++ unzip git bc python3 \
            device-tree-compiler mtools parted \
            dosfstools cpio rsync wget \
            musl-tools libssl-dev libelf-dev

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build Rust binary (static musl)
        run: |
          cd fix-automation
          cargo build --release --target x86_64-unknown-linux-musl

      # ── Buildroot ─────────────────────────────────────────────────────────
      # Cache BEFORE download — so it can be restored first
      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: buildroot/dl
          key: ${{ runner.os }}-buildroot-dl-${{ hashFiles('fix-automation/os-config/configs/linux_rescue_defconfig') }}
          restore-keys: |
            ${{ runner.os }}-buildroot-dl

      - name: Download Buildroot
        run: |
          wget https://buildroot.org/downloads/buildroot-2025.02.13.tar.gz
          tar -xf buildroot-2025.02.13.tar.gz
          mv buildroot-2025.02.13 buildroot

      - name: Inject binary into overlay
        run: |
          mkdir -p fix-automation/os-config/rootfs_overlay/usr/bin
          mkdir -p fix-automation/os-config/rootfs_overlay/sbin

          cp fix-automation/target/x86_64-unknown-linux-musl/release/fix-automation \
             fix-automation/os-config/rootfs_overlay/usr/bin/fix-automation

          chmod +x fix-automation/os-config/rootfs_overlay/usr/bin/fix-automation

          # Make it PID 1
          ln -sf /usr/bin/fix-automation \
            fix-automation/os-config/rootfs_overlay/sbin/init

      - name: Build OS image
        run: |
          cd buildroot
          make BR2_EXTERNAL=../fix-automation/os-config linux_rescue_defconfig
          make -j$(nproc)

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package bootable ZIP
        run: |
          mkdir -p release/EFI/BOOT

          # Kernel + initramfs
          cp buildroot/output/images/bzImage        release/EFI/BOOT/
          cp buildroot/output/images/rootfs.cpio.gz release/EFI/BOOT/

          # GRUB EFI bootloader (built by Buildroot)
          cp buildroot/output/images/efi-part/EFI/BOOT/BOOTX64.EFI \
             release/EFI/BOOT/BOOTX64.EFI

          # GRUB config — tells GRUB how to load kernel + initramfs
          cat > release/EFI/BOOT/grub.cfg << 'EOF'
          set timeout=0
          set default=0
          menuentry "fix-automation rescue" {
              linux  /EFI/BOOT/bzImage quiet console=tty0
              initrd /EFI/BOOT/rootfs.cpio.gz
          }
          EOF

          cd release && zip -r ../grub-rescue-usb.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grub-rescue-usb
          path: grub-rescue-usb.zip
          retention-days: 7

      # ── Release (only on git tag) ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            grub-rescue-usb.zip
            fix-automation/target/x86_64-unknown-linux-musl/release/fix-automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}