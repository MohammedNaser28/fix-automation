name: Build Bootable OS & Rust Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-os:
    name: Compile Buildroot OS & Rust Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: fix-automation

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make gcc g++ unzip git bc python3 \
            device-tree-compiler mtools parted \
            dosfstools cpio rsync wget \
            musl-tools libssl-dev libelf-dev

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build Rust binary (static musl)
        run: |
          cd fix-automation
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: buildroot/dl
          key: ${{ runner.os }}-buildroot-dl-${{ hashFiles('fix-automation/os-config/configs/linux_rescue_defconfig') }}
          restore-keys: |
            ${{ runner.os }}-buildroot-dl

      - name: Download Buildroot
        run: |
          wget https://buildroot.org/downloads/buildroot-2025.02.13.tar.gz
          mkdir -p buildroot
          tar -xf buildroot-2025.02.13.tar.gz -C buildroot --strip-components=1

      - name: Inject binary into overlay
        run: |
          mkdir -p fix-automation/os-config/rootfs_overlay/usr/bin
          mkdir -p fix-automation/os-config/rootfs_overlay/sbin
          cp fix-automation/target/x86_64-unknown-linux-musl/release/fix-automation \
             fix-automation/os-config/rootfs_overlay/usr/bin/fix-automation
          chmod +x fix-automation/os-config/rootfs_overlay/usr/bin/fix-automation
          cat << 'EOF' > fix-automation/os-config/rootfs_overlay/sbin/init
          #!/bin/sh
          export PATH=/sbin:/bin:/usr/sbin:/usr/bin
          export TERM=linux
          
          echo "Mounting virtual filesystems..."
          mount -t proc proc /proc
          mount -t sysfs sys /sys
          mount -t devtmpfs dev /dev
          
          echo "Starting Fix-Automation Rescue Environment..."
          /usr/bin/fix-automation
          
          echo "Exiting... rebooting system in 3 seconds."
          sleep 3
          reboot -f
          EOF
          chmod +x fix-automation/os-config/rootfs_overlay/sbin/init

      - name: Configure Buildroot overlay path
        run: |
          echo "BR2_ROOTFS_OVERLAY=\"$(pwd)/fix-automation/os-config/rootfs_overlay\"" \
            >> fix-automation/os-config/configs/linux_rescue_defconfig

      - name: Build OS image
        run: |
          cd buildroot
          make BR2_EXTERNAL=$(pwd)/../fix-automation/os-config \
               linux_rescue_defconfig
          make -j$(nproc)

      - name: Package bootable ZIP
        run: |
          mkdir -p release/EFI/BOOT
          cp buildroot/output/images/bzImage        release/EFI/BOOT/
          cp buildroot/output/images/rootfs.cpio.gz release/EFI/BOOT/

          EFI_BIN=$(find buildroot/output/images/ -name "*.efi" | head -n 1)
          if [ -n "$EFI_BIN" ] && [ -f "$EFI_BIN" ]; then
            echo "Found GRUB EFI binary at $EFI_BIN"
            cp "$EFI_BIN" release/EFI/BOOT/BOOTX64.EFI
          else
            echo "ERROR: GRUB EFI binary not found"
            find buildroot/output/images/ -type f | sort
            exit 1
          fi

          printf 'set timeout=5\nset default=0\nmenuentry "Fix-Automation Rescue (Rust)" {\n    linux  /EFI/BOOT/bzImage quiet console=tty0 console=ttyS0,115200\n    initrd /EFI/BOOT/rootfs.cpio.gz\n}\n' \
            > release/EFI/BOOT/grub.cfg

          cd release && zip -r ../grub-rescue-usb.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grub-rescue-usb
          path: grub-rescue-usb.zip
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            grub-rescue-usb.zip
            fix-automation/target/x86_64-unknown-linux-musl/release/fix-automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}